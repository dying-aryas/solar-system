
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Solar System</title>
<style>body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at bottom, rgb(27, 39, 53) 0%, #090a0f 100%);
  overflow: hidden;
  perspective: 1000px;
 }

.solar-system {
  position: relative;
  width: 1000px;
  height: 1000px;
  transform: rotateX(60deg);
  transform-style: preserve-3d;
}

.sun {
  position: absolute;
  width: 75px;
  height: 75px;
  top: 41%;
  left: 50%;
  transform: translate(-50%, -50%) rotateX(-60deg);
  background: radial-gradient(circle, rgb(255, 191, 0), rgb(250, 131, 3));
  box-shadow:0 0 60px rgb(236, 120, 4), 0 0 20px rgb(239, 185, 114);
  border-radius: 50%;
  z-index: 10;
}

.orbit {
  position: absolute;
  border: 0.2px dashed rgba(255, 255, 255, 0.49);
  border-radius: 50%;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  transform-style: preserve-3d;
  animation: rotate linear infinite;
}

.planet {
  position: absolute;
  top: 50%;
  left: -2%;
  border-radius: 50%;
  box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.404);
}

.mercury {
  width: 160px;
  height: 160px;
  animation-duration: 5s;
}

.mercury .planet {
  width: 15px;
  height: 15px;
  background: radial-gradient(circle at 30% 30%, rgb(212, 206, 206), rgb(118, 111, 111));
  animation-duration: 5s;
}

.venus {
  width: 250px;
  height: 250px;
  animation-duration: 10s;
}

.venus .planet {
  width: 20px;
  height: 20px;
  background: radial-gradient(circle at 30% 30%, rgb(169, 146, 89), rgb(190, 122, 20));
  animation-duration: 10s;
}

.earth {
  width: 340px;
  height: 340px;
  animation-duration: 15s;
}

.earth .planet {
  width: 25px;
  height: 25px;
  background: radial-gradient(circle at 30% 30%, rgb(4, 219, 40), rgb(35, 39, 243));
  animation-duration: 15s;
}

.mars {
  width: 430px;
  height: 430px;
  animation-duration: 20s;
}

.mars .planet {
  width: 19px;
  height: 19px;
  background: radial-gradient(circle at 30% 30%, rgb(255, 126, 96), rgb(139, 30, 0));
  animation-duration: 20s;
}

/* Jupiter */
.jupiter {
  width: 520px;
  height: 520px;
  animation-duration: 30s;
}

.jupiter .planet {
  width: 36px;
  height: 36px;
  background: radial-gradient(circle at 30% 30%, rgb(229, 179, 129), rgb(139, 90, 43));
  animation-duration: 30s;
}

/* Saturn */
.saturn {
  width: 610px;
  height: 610px;
  animation-duration: 40s;
}

.saturn .planet {
  width: 30px;
  height: 30px;
  background: radial-gradient(circle at 30% 30%, rgb(245, 222, 179), rgb(194, 160, 96));
  animation-duration: 40s;
  position: relative;
}
.saturn .planet::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  border: 3px solid rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotateX(60deg);
}

.uranus {
  width: 700px;
  height: 700px;
  animation-duration: 50s;
}

.uranus .planet {
  width: 27px;
  height: 27px;
  background: radial-gradient(circle at 30% 30%, rgb(173, 239, 255), rgb(91, 192, 222));
  animation-duration: 50s;
}

.neptune {
  width: 790px;
  height: 790px;
  animation-duration: 60s;
}

.neptune .planet {
  width: 25px;
  height: 25px;
  background: radial-gradient(circle at 30% 30%, rgb(75, 112, 221), rgb(27, 42, 128));
  animation-duration: 60s;
}

@keyframes rotate {
  from {
    transform: translate(-50%, -50%) rotateZ(0deg);
  }
  to {
    transform: translate(-50%, -50%) rotateZ(360deg);
  }
}

@keyframes counter-rotate {
  from {
    transform: translateY(-50%) rotateX(-60deg) rotateZ(0deg);
  }
  to {
    transform: translateY(-50%) rotateX(-60deg) rotateZ(-360deg);
  }
}

body {
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 1px, transparent 2px),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 1px, transparent 2px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 2px, transparent 3px),
    radial-gradient(circle at 10% 80%, rgba(255,255,255,0.12) 1px, transparent 2px),
    radial-gradient(circle at 90% 20%, rgba(255,255,255,0.1) 2px, transparent 3px),
    radial-gradient(circle, #1b2735 0%, #090a0f 100%);
  
  background-size: 
    200px 200px,
    300px 300px,
    400px 400px,
    250px 250px,
    350px 350px,
    cover;
}

body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 70% 30%, rgba(100,150,255,0.15), transparent 60%);
  pointer-events: none;
}
</style>


</head>
<body>

<div class="solar-system">
  <div class="sun"></div>

  <div class="orbit mercury">
    <div class="planet mercury"></div>
  </div>

  <div class="orbit venus">
    <div class="planet venus"></div>
  </div>

  <div class="orbit earth">
    <div class="planet earth"></div>
  </div>

  <div class="orbit mars">
    <div class="planet mars"></div>
  </div>

  <div class="orbit jupiter">
  <div class="planet"></div>
</div>

<div class="orbit saturn">
  <div class="planet"></div>
</div>

<div class="orbit uranus">
  <div class="planet"></div>
</div>

<div class="orbit neptune">
  <div class="planet"></div>
</div>

</div>

</body>
</html>
